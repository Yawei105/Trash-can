<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>无人机产品手册</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="nav" id="nav">
    <div class="nav-inner">
      <a href="#" class="nav-logo">
        <svg viewBox="0 0 32 32" width="28" height="28"><path fill="currentColor" d="M16 2l2 6h6l-5 4 2 6-5-4-5 4 2-6-5-4h6z"/><circle cx="16" cy="18" r="3" fill="currentColor" opacity=".6"/></svg>
        UAV Product Catalog
      </a>
      <div class="nav-links" id="nav-links"></div>
      <button class="nav-toggle" id="nav-toggle" aria-label="菜单">☰</button>
    </div>
  </nav>

  <!-- Hero -->
  <header class="hero">
    <div class="hero-bg">
      <svg class="hero-waves" viewBox="0 0 1440 800" preserveAspectRatio="xMidYMid slice">
        <defs>
          <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0ea5e9" stop-opacity=".15"/>
            <stop offset="100%" stop-color="#6366f1" stop-opacity=".05"/>
          </linearGradient>
        </defs>
        <circle cx="720" cy="400" r="300" fill="none" stroke="rgba(14,165,233,.08)" stroke-width="1"/>
        <circle cx="720" cy="400" r="450" fill="none" stroke="rgba(14,165,233,.05)" stroke-width="1"/>
        <circle cx="720" cy="400" r="600" fill="none" stroke="rgba(99,102,241,.04)" stroke-width="1"/>
        <path d="M0,500 Q360,480 720,500 T1440,500" fill="none" stroke="rgba(14,165,233,.12)" stroke-width="1.5"/>
        <path d="M0,520 Q360,540 720,520 T1440,520" fill="none" stroke="rgba(99,102,241,.1)" stroke-width="1"/>
      </svg>
    </div>
    <div class="hero-content">
      <span class="hero-badge">2026 产品手册</span>
      <h1>无人机产品系列</h1>
      <p class="hero-sub">穿越机 · 多旋翼 · 固定翼 — 覆盖竞速、工业、重载、巡飞全场景</p>
      <div class="hero-stats" id="hero-stats"></div>
      <a href="#overview" class="btn btn-primary">浏览产品</a>
    </div>
    <div class="hero-drone" aria-hidden="true">
      <svg viewBox="0 0 200 200" class="drone-svg">
        <g fill="none" stroke="currentColor" stroke-width="1.5" opacity=".5">
          <line x1="100" y1="100" x2="40" y2="40"/><line x1="100" y1="100" x2="160" y2="40"/>
          <line x1="100" y1="100" x2="40" y2="160"/><line x1="100" y1="100" x2="160" y2="160"/>
          <circle cx="40" cy="40" r="18"/><circle cx="160" cy="40" r="18"/>
          <circle cx="40" cy="160" r="18"/><circle cx="160" cy="160" r="18"/>
          <rect x="85" y="85" width="30" height="30" rx="4" fill="currentColor" opacity=".3"/>
        </g>
      </svg>
    </div>
  </header>

  <!-- Overview -->
  <section class="section" id="overview">
    <div class="container">
      <div class="section-header">
        <h2>产品线概览</h2>
        <p>6 款机型，从 ¥980 竞速穿越机到 ¥70,000 巡飞固定翼，满足不同任务需求</p>
      </div>
      <div class="overview-grid" id="overview-grid"></div>
    </div>
  </section>

  <!-- Comparison -->
  <section class="section section-alt" id="compare">
    <div class="container">
      <div class="section-header">
        <h2>参数对比</h2>
        <p>一目了然，快速选型</p>
      </div>
      <div class="table-wrap">
        <table class="compare-table" id="compare-table"></table>
      </div>
    </div>
  </section>

  <!-- Product Details -->
  <div id="products-container"></div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container footer-inner">
      <div>
        <strong>无人机产品手册</strong>
        <p>价格仅供参考，配置可按需定制</p>
      </div>
      <div class="footer-note">
        <p>如需报价咨询，请联系销售团队</p>
      </div>
    </div>
  </footer>

  <script src="products-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
