<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>无人机产品手册 · A4 单页印刷版</title>
  <style>
    :root {
      --bg: #f0ede4;
      --bg-alt: #e8e4da;
      --bg-card: #faf8f2;
      --text: #2a3224;
      --text-muted: #5c6352;
      --accent: #4a5c3a;
      --accent2: #6b7d56;
      --gold: #8a6f3e;
      --green: #4a5c3a;
      --border: rgba(47, 61, 38, 0.18);
    }

    @page { size: A4; margin: 0; }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
      background: #333;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .page {
      width: 210mm;
      height: 297mm;
      padding: 7mm 8mm 6mm;
      background: linear-gradient(165deg, var(--bg) 0%, var(--bg-alt) 100%);
      color: var(--text);
      display: flex;
      flex-direction: column;
      gap: 3mm;
      overflow: hidden;
      position: relative;
    }

    /* subtle bg waves */
    .page-bg {
      position: absolute; inset: 0; pointer-events: none; opacity: .5;
    }
    .page-bg svg { width: 100%; height: 100%; }

    .content { position: relative; z-index: 1; display: flex; flex-direction: column; gap: 3mm; flex: 1; }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 2.5mm;
      border-bottom: 1px solid var(--border);
    }

    .header-left { display: flex; align-items: center; gap: 3mm; }

    .header-logo { color: var(--accent); width: 9mm; height: 9mm; flex-shrink: 0; }

    .header h1 {
      font-size: 14pt;
      font-weight: 900;
      letter-spacing: 1.5px;
      color: var(--text);
      line-height: 1.2;
    }

    .header .org {
      font-size: 7pt;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.5px;
      margin-bottom: 0.5mm;
    }

    .header .org-en {
      font-size: 5pt;
      color: var(--text-muted);
      margin-bottom: 0.8mm;
    }

    .header .sub {
      font-size: 6.5pt;
      color: var(--text-muted);
      margin-top: 0.5mm;
    }

    .header-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .badge {
      font-size: 6.5pt;
      color: var(--accent);
      font-weight: 700;
      border: 1px solid rgba(74,92,58,.35);
      background: rgba(74,92,58,.1);
      padding: 1mm 2.5mm;
      border-radius: 3px;
      letter-spacing: .5px;
      display: inline-block;
    }

    .badge-en {
      font-size: 5.5pt;
      color: var(--text-muted);
      margin-top: 1mm;
      text-align: center;
      white-space: nowrap;
      transform: translateX(-0.3ch);
    }

    /* Product cards 3x2 */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2mm;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 2mm 2.5mm;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1.5px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    .card.cat-fpv::before { background: linear-gradient(90deg, #f59e0b, var(--accent)); }
    .card.cat-wing::before { background: linear-gradient(90deg, var(--accent2), var(--accent)); }

    .card-top {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 1mm;
    }

    .card-cat {
      font-size: 5.5pt;
      color: var(--accent);
      background: rgba(14,165,233,.12);
      padding: 0.4mm 1.5mm;
      border-radius: 2px;
      font-weight: 600;
    }

    .card-price { font-size: 9pt; font-weight: 900; color: var(--gold); }

    .card-name { font-size: 7.5pt; font-weight: 800; margin-bottom: 0.5mm; line-height: 1.2; }
    .card-tag { font-size: 5.5pt; color: var(--text-muted); margin-bottom: 1.5mm; }

    .card-specs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1mm;
    }

    .spec-item {
      background: rgba(74,92,58,.06);
      border-radius: 2px;
      padding: 1mm 1.5mm;
      font-size: 5pt;
      color: var(--text-muted);
    }

    .spec-item b { display: block; font-size: 6pt; color: var(--text); font-weight: 700; }

    .card-hl {
      margin-top: 1.2mm;
      display: flex; flex-wrap: wrap; gap: 0.8mm;
    }

    .hl {
      font-size: 4.8pt;
      background: rgba(74,92,58,.12);
      color: var(--accent);
      border: 1px solid rgba(74,92,58,.2);
      padding: 0.3mm 1.2mm;
      border-radius: 2px;
    }

    /* Compare table */
    .section-label {
      font-size: 7pt;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 1px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 2mm;
    }

    .section-label::before {
      content: ''; width: 2.5px; height: 3.5mm;
      background: var(--accent); border-radius: 1px;
    }

    .table-wrap {
      border: 1px solid var(--border);
      border-radius: 3px;
      overflow: hidden;
      flex-shrink: 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 6pt;
    }

    table th {
      background: rgba(14,165,233,.15);
      color: var(--accent);
      padding: 1.5mm 1mm;
      font-weight: 700;
      text-align: center;
      line-height: 1.2;
      border-bottom: 1px solid var(--border);
    }

    table th:first-child {
      text-align: left;
      padding-left: 2mm;
      color: var(--text);
      background: rgba(14,165,233,.08);
      width: 14mm;
    }

    table td {
      padding: 1.3mm 1mm;
      text-align: center;
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
      line-height: 1.25;
    }

    table td:first-child {
      text-align: left;
      padding-left: 2mm;
      font-weight: 600;
      color: var(--text);
      background: rgba(0,0,0,.15);
    }

    table tr:last-child td { border-bottom: none; }
    table .price { color: var(--gold); font-weight: 800; }

    /* Config section: 3 cols x 2 rows + notes at bottom */
    .config-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 2mm 2.5mm;
      flex-shrink: 0;
    }

    .panel-title {
      font-size: 6.5pt;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 1.5mm;
    }

    .config-list {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, auto);
      gap: 1.5mm;
    }

    .config-item {
      font-size: 4.8pt;
      line-height: 1.35;
      color: var(--text-muted);
      padding: 1.5mm 2mm;
      background: rgba(0,0,0,.2);
      border-radius: 2px;
      border-left: 1.5px solid var(--accent);
    }

    .config-item .ci-name {
      font-size: 6pt;
      font-weight: 700;
      color: var(--text);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 1mm;
      gap: 1mm;
    }

    .config-item .ci-price { color: var(--gold); font-size: 5.5pt; white-space: nowrap; }

    .comp-rows { list-style: none; }

    .comp-rows li {
      display: flex;
      gap: 1mm;
      padding: 0.4mm 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
      font-size: 4.8pt;
      line-height: 1.3;
    }

    .comp-rows li:last-child { border-bottom: none; }

    .comp-rows .comp-n {
      font-weight: 600;
      color: var(--text);
      min-width: 7mm;
      flex-shrink: 0;
    }

    .comp-rows .comp-d { color: var(--text-muted); }

    .notes-panel {
      margin-top: 2mm;
      padding-top: 2mm;
      border-top: 1px solid var(--border);
      font-size: 5.5pt;
      color: var(--text-muted);
      line-height: 1.45;
    }

    .notes-panel strong { color: var(--gold); }

    .notes-panel ul {
      list-style: none;
      margin-top: 1mm;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5mm 3mm;
    }

    .notes-panel li {
      font-size: 5.2pt;
    }

    .notes-panel li::before {
      content: '▸';
      color: var(--accent);
      margin-right: 0.8mm;
    }

    /* Footer */
    .footer {
      padding-top: 2mm;
      border-top: 1px solid var(--border);
      font-size: 5.5pt;
      color: var(--text);
      flex-shrink: 0;
    }

    .footer-brand {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      justify-content: space-between;
      align-items: center;
      gap: 3mm;
      line-height: 1.4;
      width: 100%;
    }

    .footer-org,
    .footer-contact {
      font-size: 5.5pt;
      color: var(--text);
      font-weight: 600;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .footer-org {
      text-align: left;
    }

    .footer-contact {
      text-align: right;
      margin-left: auto;
    }

    .contact-gap {
      display: inline-block;
      width: 3ch;
    }
    @media screen {
      body { padding: 16px; display: flex; justify-content: center; }
      .page { box-shadow: 0 8px 40px rgba(0,0,0,.5); }
    }

    @media print {
      body { background: none; padding: 0; }
      .page { box-shadow: none; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="page-bg">
      <svg viewBox="0 0 794 1123" preserveAspectRatio="xMidYMid slice">
        <circle cx="700" cy="200" r="180" fill="none" stroke="rgba(14,165,233,.06)" stroke-width="1"/>
        <circle cx="700" cy="200" r="280" fill="none" stroke="rgba(14,165,233,.04)" stroke-width="1"/>
        <circle cx="100" cy="900" r="150" fill="none" stroke="rgba(99,102,241,.05)" stroke-width="1"/>
        <path d="M0,400 Q200,380 400,400 T794,400" fill="none" stroke="rgba(14,165,233,.08)" stroke-width="1"/>
        <path d="M0,800 Q200,820 400,800 T794,800" fill="none" stroke="rgba(99,102,241,.06)" stroke-width="1"/>
      </svg>
    </div>

    <div class="content">
      <header class="header">
        <div class="header-left">
          <svg class="header-logo" viewBox="0 0 32 32">
            <path fill="currentColor" d="M16 2l2 6h6l-5 4 2 6-5-4-5 4 2-6-5-4h6z"/>
            <circle cx="16" cy="18" r="3" fill="currentColor" opacity=".6"/>
          </svg>
          <div>
            <p class="org">中国科学院空天信息创新研究院</p>
            <p class="org-en">Aerospace Information Research Institute, Chinese Academy of Sciences</p>
            <h1>无人机产品宣传手册</h1>
            <p class="sub">穿越机 · 多旋翼 · 固定翼 &nbsp;|&nbsp; 6 款机型 · 全系列配置报价</p>
          </div>
        </div>
        <div class="header-badge">
          <div class="badge">AIRCAS · 2026</div>
          <div class="badge-en">UAV Product Catalog</div>
        </div>
      </header>

      <div class="cards-grid" id="cards-grid"></div>

      <div class="section-label">全系列参数对比</div>
      <div class="table-wrap">
        <table id="compare-table"></table>
      </div>

      <div class="config-section">
        <div class="panel-title">标准配置清单</div>
        <div class="config-list" id="config-list"></div>
        <div class="notes-panel" id="notes-panel"></div>
      </div>

      <footer class="footer">
        <div class="footer-brand">
          <span class="footer-org">中国科学院空天信息创新研究院</span>
          <span class="footer-contact">北京市海淀区中关村北一条9号<span class="contact-gap"></span>yorkstudio@foxmail.com</span>
        </div>
      </footer>
    </div>
  </div>

  <script src="products-data.js"></script>
  <script>
    const products = window.PRODUCTS;
    const catClass = { '穿越机': 'cat-fpv', '多旋翼': 'cat-quad', '固定翼': 'cat-wing' };
    const fmt = n => '¥' + n.toLocaleString('zh-CN');
    const sizeKey = p => p.specs['轴距'] || p.specs['翼展'] || '—';

    document.getElementById('cards-grid').innerHTML = products.map(p => `
      <div class="card ${catClass[p.category] || ''}">
        <div class="card-top">
          <span class="card-cat">${p.category}</span>
          <span class="card-price">${fmt(p.price)}</span>
        </div>
        <div class="card-name">${p.name}</div>
        <div class="card-tag">${p.tagline}</div>
        <div class="card-specs">
          ${Object.entries(p.specs).map(([k,v]) =>
            `<div class="spec-item"><b>${v}</b>${k}</div>`).join('')}
        </div>
        <div class="card-hl">${p.highlights.map(h => `<span class="hl">${h}</span>`).join('')}</div>
      </div>
    `).join('');

    const rows = [
      ['参考报价', ...products.map(p => `<span class="price">${fmt(p.price)}</span>`)],
      ['轴距/翼展', ...products.map(sizeKey)],
      ['空载重量', ...products.map(p => p.specs['空载重量'])],
      ['最大载重', ...products.map(p => p.specs['最大载重'])],
      ['续航时间', ...products.map(p => p.specs['续航时间'])],
      ['最大速度', ...products.map(p => p.specs['最大速度'])],
    ];

    document.getElementById('compare-table').innerHTML = `
      <thead><tr>
        <th>参数</th>
        ${products.map(p => `<th>${p.name.replace(' · ', '<br>')}</th>`).join('')}
      </tr></thead>
      <tbody>${rows.map(r =>
        `<tr><td>${r[0]}</td>${r.slice(1).map(v => `<td>${v}</td>`).join('')}</tr>`
      ).join('')}</tbody>`;

    document.getElementById('config-list').innerHTML = products.map(p => `
      <div class="config-item">
        <div class="ci-name"><span>${p.name}</span><span class="ci-price">${fmt(p.price)}</span></div>
        <ul class="comp-rows">
          ${p.components.map(c => `
            <li><span class="comp-n">${c.name}</span><span class="comp-d">${c.note || ''}</span></li>
          `).join('')}
        </ul>
      </div>
    `).join('');

    const notes = products.filter(p => p.priceNote);
    document.getElementById('notes-panel').innerHTML = `
      <strong>选配说明：</strong>
      以上价格为标准配置参考价，含所列核心器件整机组装费用，不含运费及定制开发。
      <ul>${notes.map(p => `<li>${p.name}：${p.priceNote}</li>`).join('')}
      </ul>`;
  </script>
</body>
</html>
