# GitHub Actions: 部署 drone-brochure 并自动启用 GitHub Pages
name: Deploy Drone Brochure

on:
  push:
    branches: [main, master]
    paths:
      - 'drone-brochure/**'
      - '.github/workflows/deploy-drone-brochure.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  administration: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./drone-brochure
          force_orphan: true

      - name: Enable GitHub Pages (gh-pages branch)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          if gh api "repos/${{ github.repository }}/pages" >/dev/null 2>&1; then
            echo "Pages already enabled, updating source..."
            gh api "repos/${{ github.repository }}/pages" -X PUT \
              -f build_type=legacy \
              -f 'source[branch]=gh-pages' \
              -f 'source[path]=/'
          else
            echo "Enabling Pages for the first time..."
            gh api "repos/${{ github.repository }}/pages" -X POST \
              -f build_type=legacy \
              -f 'source[branch]=gh-pages' \
              -f 'source[path]=/'
          fi
          echo "Pages URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
