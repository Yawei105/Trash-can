# GitHub Actions: 部署 drone-brochure 到 gh-pages 分支
name: Deploy Drone Brochure

on:
  push:
    branches: [main, master]
    paths:
      - 'drone-brochure/**'
      - '.github/workflows/deploy-drone-brochure.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./drone-brochure
          force_orphan: true
