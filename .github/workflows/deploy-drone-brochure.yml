# GitHub Actions: 将 drone-brochure 部署到 GitHub Pages
name: Deploy Drone Brochure

on:
  push:
    branches: [main, master]
    paths:
      - 'drone-brochure/**'
      - '.github/workflows/deploy-drone-brochure.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-drone-brochure
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: drone-brochure

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
